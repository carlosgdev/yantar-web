<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yantar — Tu recetario personal</title>
  <style>
    :root { --primary: #F97316; --bg: #FAFAF9; --text: #1C1917; --muted: #78716C; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    header { text-align: center; padding: 3rem 0 2rem; }
    header h1 { font-size: 2.5rem; color: var(--primary); }
    header p { color: var(--muted); font-size: 1.1rem; margin-top: 0.5rem; }
    nav { text-align: center; margin: 1rem 0 2rem; }
    nav a { color: var(--primary); text-decoration: none; margin: 0 1rem; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    h2 { font-size: 1.5rem; margin: 2rem 0 0.75rem; color: var(--text); }
    h3 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
    p, li { margin-bottom: 0.5rem; }
    ul { padding-left: 1.5rem; }
    .update { color: var(--muted); font-size: 0.9rem; margin-top: 3rem; text-align: center; }
    footer { text-align: center; padding: 2rem 0; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Yantar</h1>
      <p>Tus recetas limpias, organizadas y listas para cocinar.</p>
    </header>
    <nav>
      <a href="privacy.html">Privacidad</a>
      <a href="terms.html">Condiciones</a>
      <a href="support.html">Soporte</a>
    </nav>
    <p style="text-align:center; color: var(--muted);">Sin anuncios. Sin suscripciones. Tu cocina, tus reglas.</p>
    <footer>&copy; 2026 Yantar</footer>
  </div>
</body>
</html>
